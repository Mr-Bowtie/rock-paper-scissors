<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="RPS.css">
</head>
<body>
    <button type="button" class="btn" id='rock'>Rock</button>
    <button type="button" class="btn" id='paper'>Paper</button>
    <button type="button" class="btn" id='scissors'>Scissors</button>
    <div id="scoreboard">
        <div class="score" >
            Player: 
            <span class="playerTally"></span>
        </div>
        <div class="score" >
            Computer:
            <span class="computerTally"></span>
        </div>
        <div class='roundResults'>
            <h2>Round Results</h2>
            <div>
                Player:
                <span id="playerChoice"></span>
            </div>
            <div>
                Computer: 
                <span id="computerChoice"></span>
            </div>
            <div id="tie"></div>
        </div>
    </div>
</body>
<script src='RPS.js'></script>
</html>
